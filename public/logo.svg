<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="#050a0f" stroke="#0ff" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Glow -->
  <circle cx="100" cy="100" r="80" fill="url(#glow)"/>

  <!-- Outer ring segments -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#00f5ff" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="30 10"/>
  <circle cx="100" cy="100" r="70" fill="none" stroke="#ffd700" stroke-width="0.5" stroke-opacity="0.25" stroke-dasharray="15 5"/>

  <!-- Inner hex shape -->
  <polygon points="100,30 158,65 158,135 100,170 42,135 42,65" fill="none" stroke="#00f5ff" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Sun rays (nordeste touch) -->
  <g stroke="#ffd700" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <line x1="100" y1="14" x2="100" y2="26"/>
    <line x1="100" y1="174" x2="100" y2="186"/>
    <line x1="14" y1="100" x2="26" y2="100"/>
    <line x1="174" y1="100" x2="186" y2="100"/>
    <line x1="35" y1="35" x2="44" y2="44"/>
    <line x1="156" y1="156" x2="165" y2="165"/>
    <line x1="35" y1="165" x2="44" y2="156"/>
    <line x1="156" y1="44" x2="165" y2="35"/>
  </g>

  <!-- B letter -->
  <text x="100" y="128" font-family="monospace" font-size="78" font-weight="bold" fill="url(#letterGrad)" text-anchor="middle" opacity="0.9" filter="url(#blur)">B</text>
  <text x="100" y="128" font-family="monospace" font-size="78" font-weight="bold" fill="url(#letterGrad)" text-anchor="middle" opacity="0.95">B</text>

  <!-- Corner dots -->
  <circle cx="100" cy="22" r="2.5" fill="#ffd700" opacity="0.8"/>
  <circle cx="100" cy="178" r="2.5" fill="#ffd700" opacity="0.8"/>
  <circle cx="22" cy="100" r="2.5" fill="#00f5ff" opacity="0.8"/>
  <circle cx="178" cy="100" r="2.5" fill="#00f5ff" opacity="0.8"/>
</svg>
